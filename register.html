<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - DivyangSathi</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">
DivyangSathi
</div>

<nav>

<a href="index.html">Home</a>

<a href="register.html">Register</a>

<a href="login.html">Login</a>

<a href="search.html">Search Profiles</a>

<a href="membership.html">Membership</a>

<a href="contact.html">Contact</a>

</nav>

</header>

<section class="register-section">

<h1>
Create Your Account
</h1>

<form class="register-form" id="registerForm">

<input
type="text"
id="full_name"
placeholder="Full Name"
required>

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<select
id="gender"
required>

<option value="">
Select Gender
</option>

<option value="Male">
Male
</option>

<option value="Female">
Female
</option>

<option value="Other">
Other
</option>

</select>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="password"
id="confirm_password"
placeholder="Confirm Password"
required>

<label>

<input
type="checkbox"
required>

I Agree To The Terms & Conditions

</label>

<button type="submit">

Register Now

</button>

</form>

<p style="margin-top:20px;">

Already have an account?

<a href="login.html">

Login Here

</a>

</p>

</section>

<footer>

<p>

© 2025 DivyangSathi. All Rights Reserved.

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>

</html>
