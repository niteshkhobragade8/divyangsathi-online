<section class="register-section">

<h1>
Create Your Account
</h1>

<form class="register-form">

<input type="text"
placeholder="Full Name"
required>

<input type="tel"
placeholder="Mobile Number"
required>

<input type="email"
placeholder="Email Address"
required>

<select required>

<option value="">
Select Gender
</option>

<option>
Male
</option>

<option>
Female
</option>

<option>
Other
</option>

</select>

<input type="password"
placeholder="Password"
required>

<input type="password"
placeholder="Confirm Password"
required>

<label>

<input type="checkbox" required>

I Agree To The Terms & Conditions

</label>

<button type="submit">

Register Now

</button>

</form>

<p style="margin-top:20px;">

Already have an account?

<a href="login.html">

Login Here

</a>

</p>

</section>
