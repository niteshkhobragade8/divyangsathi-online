<body>

<header>

</header>

<section class="profile-section">

<h1>Create / Update Profile</h1>

<form class="profile-form">

<h2>Profile Photos</h2>

<label>Main Profile Photo</label>
<input type="file" accept="image/*">

<label>Gallery Photo 1</label>
<input type="file" accept="image/*">

<label>Gallery Photo 2</label>
<input type="file" accept="image/*">

<label>Gallery Photo 3</label>
<input type="file" accept="image/*">

<h2>Basic Information</h2>

<input type="text" placeholder="Full Name">

<input type="number" placeholder="Age">

<select>
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Date of Birth</label>
<input type="date">

<h2>Disability Information</h2>

<input type="text" placeholder="Disability Type">

<input type="text" placeholder="Disability Percentage">

<h2>Personal Information</h2>

<input type="text" placeholder="Religion">

<input type="text" placeholder="Caste (Optional)">

<select>
<option>Marital Status</option>
<option>Never Married</option>
<option>Divorced</option>
<option>Widowed</option>
</select>

<input type="text" placeholder="Height">

<input type="text" placeholder="Weight">

<h2>Education & Career</h2>

<input type="text" placeholder="Education">

<input type="text" placeholder="Occupation">

<input type="text" placeholder="Annual Income">

<h2>Location</h2>

<input type="text" placeholder="State">

<input type="text" placeholder="District">

<input type="text" placeholder="City">

<h2>About Me</h2>

<textarea rows="5" placeholder="Write About Yourself"></textarea>

<h2>Partner Preference</h2>

<input type="text" placeholder="Preferred Age">

<input type="text" placeholder="Preferred State">

<input type="text" placeholder="Preferred Disability">

<textarea rows="5" placeholder="Partner Preference"></textarea>

<button type="submit">
Save Profile
</button>

<br><br>

<button type="button">
Update Profile
</button>

</form>

</section>

<footer>

<p>

</p>

</footer>

</body>

</html>
